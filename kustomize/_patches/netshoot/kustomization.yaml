apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
- target:
    group: apps
    version: v1
    kind: Deployment
  patch: |-
    - op: add
      path: "/spec/template/spec/containers/-"
      value:
        name: sidecar-netshoot
        image: nicolaka/netshoot:latest
        args:
        - sleep
        - "3600"
